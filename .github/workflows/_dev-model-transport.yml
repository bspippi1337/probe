name: Temporary Whisper model transport

on:
  pull_request:
    paths:
      - '_dev/model-transport-trigger.txt'

permissions:
  contents: read

jobs:
  transport-model:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download pinned public Faster-Whisper Small INT8 model
        shell: bash
        run: |
          set -Eeuo pipefail
          commit='a94e151d8147ce851767640f24b3e854cf60def7'
          base="https://huggingface.co/rhasspy/faster-whisper-small-int8/resolve/$commit"
          mkdir -p faster-whisper-small-int8
          for f in model.bin config.json vocabulary.txt; do
            curl --location --fail --retry 5 --retry-all-errors \
              --output "faster-whisper-small-int8/$f" "$base/$f?download=true"
          done
          sha256sum faster-whisper-small-int8/* > model-files.sha256
          tar --format=posix -cf faster-whisper-small-int8.tar \
            faster-whisper-small-int8 model-files.sha256
          sha256sum faster-whisper-small-int8.tar > full-tar.sha256
          stat --printf='%n bytes=%s\n' faster-whisper-small-int8/*

      - name: Upload verified model and manifests
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-small-int8-pinned
          path: |
            faster-whisper-small-int8.tar
            full-tar.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
