name: Temporary Whisper model transport

on:
  pull_request:
    paths:
      - '_dev/model-transport-trigger.txt'

permissions:
  contents: read

jobs:
  transport-model:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download public multilingual Whisper Medium Q5 model
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --location --fail --retry 5 --retry-all-errors \
            --output ggml-medium-q5_0.bin \
            'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium-q5_0.bin?download=true'
          printf '%s  %s\n' \
            '19fea4b380c3a618ec4723c3eef2eb785ffba0d0538cf43f8f235e7b3b34220f' \
            'ggml-medium-q5_0.bin' | sha256sum --check --strict
          stat --printf='bytes=%s\n' ggml-medium-q5_0.bin

      - name: Upload verified model artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-medium-q5_0
          path: ggml-medium-q5_0.bin
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
