name: Temporary Whisper model transport

on:
  pull_request:
    paths:
      - '_dev/model-transport-trigger.txt'

permissions:
  contents: read

jobs:
  transport-model:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Download pinned complete Systran Faster-Whisper Small model
        shell: bash
        run: |
          set -Eeuo pipefail
          ref='536b066'
          base="https://huggingface.co/Systran/faster-whisper-small/resolve/$ref"
          mkdir -p faster-whisper-small-complete
          for f in model.bin config.json tokenizer.json vocabulary.txt; do
            curl --location --fail --retry 5 --retry-all-errors \
              --output "faster-whisper-small-complete/$f" "$base/$f?download=true"
          done
          sha256sum faster-whisper-small-complete/* > model-files.sha256
          tar --format=posix -cf faster-whisper-small-complete.tar \
            faster-whisper-small-complete model-files.sha256
          sha256sum faster-whisper-small-complete.tar > full-tar.sha256
          stat --printf='%n bytes=%s\n' faster-whisper-small-complete/*

      - name: Upload complete model and manifests
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-small-complete-pinned
          path: |
            faster-whisper-small-complete.tar
            full-tar.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
