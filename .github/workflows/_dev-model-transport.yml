name: Temporary Resemblyzer transport

on:
  pull_request:
    paths:
      - '_dev/model-transport-trigger.txt'

permissions:
  contents: read

jobs:
  transport:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download and verify Resemblyzer 0.1.4
        shell: bash
        run: |
          set -Eeuo pipefail
          url='https://files.pythonhosted.org/packages/d9/b5/d897d5de5b2123a1ad5d32e8e007d83f76582f5c32c60992577263bd7c7e/Resemblyzer-0.1.4-py3-none-any.whl'
          curl --location --fail --retry 5 --retry-all-errors \
            --output Resemblyzer-0.1.4-py3-none-any.whl "$url"
          printf '%s  %s\n' \
            '8f12eb2f1a9982d32e8db7856de754709b59c93a77bcf0ff536584b619a9dd1f' \
            'Resemblyzer-0.1.4-py3-none-any.whl' | sha256sum --check --strict
          sha256sum Resemblyzer-0.1.4-py3-none-any.whl > Resemblyzer-0.1.4.sha256

      - name: Upload verified wheel
        uses: actions/upload-artifact@v4
        with:
          name: resemblyzer-0.1.4-verified
          path: |
            Resemblyzer-0.1.4-py3-none-any.whl
            Resemblyzer-0.1.4.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
