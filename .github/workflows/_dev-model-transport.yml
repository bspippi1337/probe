name: Temporary whisper.cpp runtime transport

on:
  pull_request:
    paths:
      - '_dev/model-transport-trigger.txt'

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Build pinned whisper.cpp runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          git clone --depth 1 --branch v1.7.5 https://github.com/ggml-org/whisper.cpp.git whisper.cpp
          cmake -S whisper.cpp -B whisper.cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF \
            -DGGML_NATIVE=OFF
          cmake --build whisper.cpp/build --config Release --target whisper-cli -j 2
          mkdir runtime
          cp whisper.cpp/build/bin/whisper-cli runtime/
          find whisper.cpp/build -type f \( -name 'libwhisper.so*' -o -name 'libggml*.so*' \) -exec cp -a {} runtime/ \;
          chmod 0755 runtime/whisper-cli
          sha256sum runtime/* > runtime.sha256
          LD_LIBRARY_PATH="$PWD/runtime" runtime/whisper-cli --help >/dev/null
          tar --format=posix -cf whisper-cpp-v1.7.5-runtime.tar runtime runtime.sha256
          sha256sum whisper-cpp-v1.7.5-runtime.tar > runtime-tar.sha256
          ls -lh runtime

      - name: Upload runtime
        uses: actions/upload-artifact@v4
        with:
          name: whisper-cpp-v1.7.5-runtime
          path: |
            whisper-cpp-v1.7.5-runtime.tar
            runtime-tar.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
